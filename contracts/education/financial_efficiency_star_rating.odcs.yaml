apiVersion: v3.1.0
kind: DataContract
id: education.financial_efficiency_star_rating
name: financial_efficiency_star_rating
version: 1.0.0
status: active
domain: education
tenant: georgia-public-data
description:
  purpose: 'Georgia Office of Student Achievement (GOSA) Financial Efficiency Star Rating (FESR) dataset
    at two detail levels in one fact table: district (one row per traditional Georgia school system, FY2014-FY2024)
    and school (one row per school, FY2017-FY2024). Reports per-pupil expenditure (PPE) inputs — total,
    federal, and state/local — full-time-equivalent K-12 enrollment, a CCRPI-derived annual Single Score,
    and the FESR star rating (0.5-5.0 in 0.5 increments). District rows additionally carry the federal
    vs state/local split of total expenditures, three-year rolling PPE and Single Score averages, and
    a PPE percentile rank; school rows additionally carry the pre-allocation included/excluded expenditure
    split and the school''s share of district enrollment. Coverage in tidy long form, one row per (district[,
    school], fiscal year). FESR and the rolling metrics are populated only on the fiscal year each publishing
    report treats as its newest year (FY2016-FY2019, FY2024 for districts; FY2017-FY2019, FY2024 for schools);
    GOSA paused the program 2020-2023. Merges the formerly separate financial_efficiency_star_rating_fesr_district
    and financial_efficiency_star_rating_fesr_school topics.'
  usage: Star-schema fact table. Join the districts dimension on district_code; the schools dimension
    on district_code + school_code. Read directly with DuckDB over Parquet.
  limitations: 'Two detail levels (district, school) in one fact table, split by parquet filename; school_code
    is NULL on district rows. Detail level is read from the geography-key NULL pattern. The district level
    covers FY2014-FY2024 (180 traditional systems, codes 601-793, no charters/RESAs/state agencies); the
    school level covers FY2017-FY2024 (all schools, including charter authorizers). School-level and district-level
    rows come from two independent GOSA downloads whose K-12 bases need not reconcile, so school rows
    are NOT guaranteed to sum to their district row. Level-specific columns are NULL on the other level:
    federal_expenditures / state_local_expenditures and the three rolling/percentile metrics are district-only;
    included_* / excluded_expenditures / total_federal_expenditures / total_state_local_expenditures /
    pct_of_district_enrollment are school-only. The district federal_expenditures and the school total_federal_expenditures
    are the same federal share of total_expenditures but are kept as separate columns (different source
    naming; schools also publish the distinct pre-allocation included_* split). fesr_star_rating and the
    rolling/percentile metrics are populated only on the report-year row of each rolling-window publication;
    GOSA paused the program FY2020-FY2023 (those years carry only PPE inputs), and ccrpi_single_score
    is additionally NULL for FY2020-FY2022 (CCRPI paused). District federal/state-local breakdowns are
    NULL for FY2014 (the only source covering FY14 published totals only). FY2022 methodology change:
    from FY22 school total_expenditures (and per_pupil_expenditure) additionally include Allocated CCA
    and Alternative Program costs, so FY22+ school totals are not strictly comparable to FY17-FY21. Placeholder
    $0 school expenditure amounts on unreported/non-compliant FY17-FY18 rows are NULLed per §4b (see _transform_manifest.json
    masked_values). A small number of district 660 (Atlanta) school rows carry negative expenditure /
    per-pupil values — faithful GOSA restatements preserved as-is. Currency is nominal dollars (not inflation-adjusted).
    No cell-level small-cell suppression exists in this source; NULLs are structural or §4b masks, never
    suppression.'
tags:
- education
- governor's office of student achievement
- financial_efficiency_star_rating
servers:
- server: s3_gold
  type: s3
  location: s3://georgia-data-gold/education/financial_efficiency_star_rating/**/*.parquet
  format: parquet
- server: local_gold
  type: local
  path: data/gold/education/financial_efficiency_star_rating/**/*.parquet
  format: parquet
schema:
- name: financial_efficiency_star_rating
  logicalType: object
  physicalType: parquet
  physicalName: financial_efficiency_star_rating
  description: financial_efficiency_star_rating fact table, year-partitioned Parquet (split by detail
    level where present).
  dataGranularityDescription: One row per year, district_code, school_code (geography columns are NULL
    at higher aggregation levels).
  customProperties:
  - property: sub_topic
    value: gosa
  - property: detail_levels
    value:
    - schools
    - districts
  - property: default_detail
    value: schools
  - property: grain
    value:
    - year
    - district_code
    - school_code
  - property: key_metric
    value: per_pupil_expenditure
  - property: null_semantics
    value:
      suppressed_to_null: false
      zero_is_real: true
  - property: partition_columns
    value:
    - year
  - property: path_template
    value: education/financial_efficiency_star_rating/year={year}/{detail}.parquet
  - property: foreign_keys
    value:
    - column: district_code
      target_object: districts
      target_columns:
      - district_code
      attribute_columns:
      - district_name
      - district_census_id
      - district_type
      scope: domain
    - column: school_code
      target_object: schools
      target_columns:
      - district_code
      - school_code
      attribute_columns:
      - school_name
      scope: domain
  - property: example_queries
    value:
    - description: Latest year (2024), schools detail
      query: SELECT * FROM financial_efficiency_star_rating WHERE year = 2024 LIMIT 100
    - description: District 657 in 2024
      query: SELECT * FROM financial_efficiency_star_rating WHERE district_code = '657' AND year = 2024
        LIMIT 100
    - description: Filter by is_non_compliant = False
      query: SELECT * FROM financial_efficiency_star_rating WHERE is_non_compliant = 'False' AND year
        = 2024 LIMIT 100
  properties:
  - name: year
    logicalType: integer
    physicalType: int
    required: true
    description: 'Fiscal year the row''s PPE inputs refer to (e.g. FY2024 = 2023-24 school year). Differs
      from the bronze filename year for back-window rows: each rolling report covers up to 3 fiscal years,
      but gold keys every row by the actual fiscal year.'
    examples:
    - 2024
    customProperties:
    - property: column_role
      value: year
    - property: label
      value: Year
    primaryKey: true
    primaryKeyPosition: 1
  - name: district_code
    logicalType: string
    physicalType: string
    required: true
    description: GOSA district/system code (FK to districts dimension), zero-padded to 3 digits (7-digit
      codes are charter authorizers, school rows only). District-detail rows cover the 180 traditional
      school systems (codes 601-793); school-detail rows additionally include charter authorizer codes.
      Populated on every row.
    examples:
    - '657'
    relationships:
    - to: districts.district_code
    customProperties:
    - property: column_role
      value: fk_district
    - property: label
      value: District Code
    primaryKey: true
    primaryKeyPosition: 2
  - name: school_code
    logicalType: string
    physicalType: string
    required: false
    description: GOSA school code, zero-padded to 4 characters (composite FK to schools dimension with
      district_code; not globally unique on its own). Populated on school rows only — district aggregate
      rows carry NULL.
    examples:
    - '0103'
    relationships:
    - to: schools.district_code
    - to: schools.school_code
    customProperties:
    - property: column_role
      value: fk_school
    - property: label
      value: School Code
    - property: null_meaning
      value: Populated only on school-detail rows; NULL on every district-detail row (the district level
        has no school code). The geography-key NULL pattern is how detail level is read from the unioned
        table.
    primaryKey: true
    primaryKeyPosition: 3
  - name: total_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Total expenditures for the fiscal year (nominal dollars, not inflation-adjusted). For
      DISTRICT rows this is the district's total included expenditures (= federal_expenditures + state_local_expenditures
      within $1, enforced by a quality check). For SCHOOL rows this is the per-school total — included
      expenditures plus the school's allocated share of district central costs (= total_federal_expenditures
      + total_state_local_expenditures within $10; from FY22 also folds in Allocated CCA and Alternative
      Program costs, so FY22+ school totals are not strictly comparable to FY17-FY21). per_pupil_expenditure
      = total_expenditures / fte_enrollment at both levels.
    examples:
    - 8125000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Total Expenditures
    - property: unit
      value: currency
  - name: fte_enrollment
    logicalType: integer
    physicalType: bigint
    required: false
    description: Full-time-equivalent K-12 enrollment, the denominator of per_pupil_expenditure (per_pupil_expenditure
      = total_expenditures / fte_enrollment within rounding at both detail levels, enforced by a quality
      check).
    examples:
    - 984
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: FTE Enrollment
    - property: unit
      value: count
    - property: metric_component
      value: denominator
  - name: per_pupil_expenditure
    logicalType: number
    physicalType: double
    required: false
    description: Per-pupil expenditure for the fiscal year (nominal dollars) = total_expenditures / fte_enrollment,
      as published (rounded to cents by the source). A few Atlanta (district 660) school rows in FY21/FY22
      are negative — faithful GOSA restatements preserved per §4b, not errors.
    examples:
    - 9349.52
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Per-Pupil Expenditure
    - property: short_description
      value: Total dollars spent per student for the fiscal year (nominal, not inflation-adjusted).
    - property: unit
      value: currency
    - property: key_metric
      value: true
  - name: federal_per_pupil_expenditure
    logicalType: number
    physicalType: double
    required: false
    description: Federal portion of per_pupil_expenditure (nominal dollars). federal_per_pupil_expenditure
      + state_local_per_pupil_expenditure = per_pupil_expenditure within rounding (enforced by a quality
      check). NULL for district FY2014.
    examples:
    - 578.3
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Federal per Pupil Expenditure
    - property: unit
      value: currency
    - property: null_meaning
      value: NULL for district FY2014 (the 2016 workbook, the only source covering FY14, published no
        federal/state-local breakdown).
  - name: state_local_per_pupil_expenditure
    logicalType: number
    physicalType: double
    required: false
    description: State + local portion of per_pupil_expenditure (nominal dollars). NULL for district FY2014.
    examples:
    - 8771.22
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: State Local per Pupil Expenditure
    - property: unit
      value: currency
    - property: null_meaning
      value: NULL for district FY2014 (no breakdown published).
  - name: federal_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Federal portion of the district's total_expenditures (nominal dollars). District-detail
      rows only. The school-level analogue of this quantity is total_federal_expenditures (both split
      the shared total_expenditures column); they are kept as separate columns because the school download
      names them differently and additionally publishes the pre-allocation included_* split, which districts
      do not.
    examples:
    - 5542000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Federal Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on DISTRICT rows only (NULL on every school row — schools instead publish total_federal_expenditures,
        the same federal share of total_expenditures, plus the distinct included_federal_expenditures
        pre-allocation split). Also NULL for district FY2014, whose only source published totals without
        a breakdown.
  - name: state_local_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: State + local portion of the district's total_expenditures (nominal dollars). District-detail
      rows only; the school-level analogue is total_state_local_expenditures.
    examples:
    - 79501000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: State Local Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on DISTRICT rows only (NULL on every school row — schools publish total_state_local_expenditures
        instead). Also NULL for district FY2014 (no breakdown).
  - name: included_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Total included expenditures for the school (nominal dollars), BEFORE allocation of district
      central costs — the school's total_expenditures equals included_expenditures plus its allocated
      central-cost share. School-detail rows only. Placeholder $0 values on unreported/non-compliant FY17-FY18
      rows are NULLed per §4b (see limitations).
    examples:
    - 7413403.4
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Included Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on every district row — the district download has no
        pre-allocation included split; a district's total_expenditures IS its included total).
  - name: included_federal_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Federal portion of the school's included_expenditures (nominal dollars). included_federal_expenditures
      + included_state_local_expenditures = included_expenditures (exact in the canonical bronze blocks;
      enforced by a quality check). School-detail rows only. FY17-FY18 placeholder $0 values NULLed per
      §4b.
    examples:
    - 456789.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Included Federal Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows).
  - name: included_state_local_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: State + local portion of the school's included_expenditures (nominal dollars). School-detail
      rows only. FY17-FY18 placeholder $0 values NULLed per §4b.
    examples:
    - 6956614.4
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Included State Local Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows).
  - name: excluded_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Expenditures excluded from the PPE computation (nominal dollars) per the FESR methodology.
      NOT a component of total_expenditures (totals = included + allocated central costs). School-detail
      rows only. A few rows per year carry negative values — faithful GOSA restatements preserved per
      §4b. FY17-FY18 placeholder $0 values NULLed per §4b.
    examples:
    - 120000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Excluded Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows).
  - name: total_federal_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: Federal portion of the school's total_expenditures (post-allocation; nominal dollars).
      The school-level analogue of the district's federal_expenditures (both split the shared total_expenditures).
      School-detail rows only. FY17-FY18 placeholder $0 values NULLed per §4b.
    examples:
    - 500000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Total Federal Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows — the district analogue is federal_expenditures).
  - name: total_state_local_expenditures
    logicalType: number
    physicalType: double
    required: false
    description: State + local portion of the school's total_expenditures (post-allocation; nominal dollars).
      School-detail rows only; the district analogue is state_local_expenditures. FY17-FY18 placeholder
      $0 values NULLed per §4b.
    examples:
    - 7625000.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Total State Local Expenditures
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows — the district analogue is state_local_expenditures).
  - name: pct_of_district_enrollment
    logicalType: number
    physicalType: double
    required: false
    description: 'The school''s share of its district''s total enrollment, 0-1 decimal (0.2912 = 29.12%),
      used by the FESR methodology to allocate district central costs. School-detail rows only. Caveat:
      within-district sums are not a strict partition — they exceed 1.0 in 55 district-years (up to 1.82),
      faithful to bronze.'
    examples:
    - 0.2912
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent of District Enrollment
    - property: unit
      value: proportion
    - property: null_meaning
      value: Populated on SCHOOL rows only (NULL on district rows). Also NULL for charter/excluded schools
        outside the district rollup.
  - name: ccrpi_single_score
    logicalType: number
    physicalType: double
    required: false
    description: CCRPI-derived annual Single Score, preserved as published (a GOSA score, not a rate).
      Typically a 0-100 scale; FY17 school scores may exceed 100 due to early-CCRPI challenge-point scoring
      (29 rows reach ~108.2), so no upper bound is enforced (a negative score is impossible — enforced).
      NULL for FY2020-FY2022 (program pause).
    examples:
    - 76.2
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: CCRPI Single Score
    - property: unit
      value: score
    - property: null_meaning
      value: NULL for FY2020-FY2022 (CCRPI paused). For schools, also NULL for FY17/FY18 schools absent
        from the 2019 file (the only file carrying their score). For districts, populated on every fiscal
        year a workbook covers except the pause.
  - name: per_pupil_expenditure_three_year_avg
    logicalType: number
    physicalType: double
    required: false
    description: Three-year rolling average of per_pupil_expenditure (nominal dollars), attributed to
      the publishing district report's newest fiscal year (FY2016, FY2017, FY2018, FY2019, FY2024) and
      NULL elsewhere. FY2024's window is non-contiguous (FY19+FY23+FY24). District-detail rows only. C-1
      rename of the former ppe_three_year_avg.
    examples:
    - 9024.04
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Per Pupil Expenditure Three Year Average
    - property: unit
      value: currency
    - property: null_meaning
      value: Populated on DISTRICT report-year rows only (FY2016-FY2019, FY2024); NULL on every school
        row and on non-report-year district rows. Schools do not publish rolling averages (derivable from
        yearly values).
  - name: ccrpi_three_year_avg
    logicalType: number
    physicalType: double
    required: false
    description: Three-year rolling average of ccrpi_single_score (0-100 scale), attributed to district
      report-year rows only (see per_pupil_expenditure_three_year_avg). District-detail rows only.
    examples:
    - 71.2
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: CCRPI Three Year Average
    - property: unit
      value: score
    - property: value_min
      value: 0
    - property: value_max
      value: 100
    - property: null_meaning
      value: Populated on DISTRICT report-year rows only (FY2016-FY2019, FY2024); NULL on every school
        row and on non-report-year district rows.
  - name: per_pupil_expenditure_percentile
    logicalType: integer
    physicalType: bigint
    required: false
    description: Percentile rank (1-100 integer) of the district's per_pupil_expenditure_three_year_avg
      among all 180 Georgia districts in the same report — population-based, not a national percentile.
      Higher = more spending per pupil. District report-year rows only. C-1 rename of the former ppe_percentile.
    examples:
    - 76
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Per Pupil Expenditure Percentile
    - property: unit
      value: percentile
    - property: null_meaning
      value: Populated on DISTRICT report-year rows only (FY2016-FY2019, FY2024); NULL on every school
        row and on non-report-year district rows.
  - name: fesr_star_rating
    logicalType: number
    physicalType: double
    required: false
    description: 'Financial Efficiency Star Rating in 0.5 increments. Districts: observed 1.0-5.0; schools:
      0.5-5.0 (the value range spans both levels). Populated only on report-year rows; half-steps enforced
      by a quality check. Bronze stores it as Float64 in early files and as strings in later files; non-numeric
      publisher statuses (district ''Non-Compliant''; school ''.'', ''Non-Compliant[ in 20YY]'') are NULLed
      here, with non-compliance preserved via is_non_compliant.'
    examples:
    - 3.5
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: FESR Star Rating
    - property: unit
      value: rating
    - property: value_min
      value: 0.5
    - property: value_max
      value: 5
    - property: null_meaning
      value: 'Populated only on the fiscal year each publishing report treats as its newest year (district:
        FY2016-FY2019, FY2024; school: FY2017-FY2019, FY2024); NULL during the FY2020-FY2023 program pause,
        off report years, and where the publisher issued a ''Non-Compliant'' status or no rating instead
        (is_non_compliant=true or, for schools, the `.` sentinel).'
  - name: is_non_compliant
    logicalType: boolean
    physicalType: boolean
    required: false
    description: 'FESR publication outcome: true when the source flags the entity non-compliant (no star
      rating exists, so fesr_star_rating is NULL — enforced by a quality check); false when a numeric
      rating was published; NULL when no FESR outcome was published. Districts: the 2018 report''s ''Non-Compliant''
      status (Talbot County 730). Schools: FY17/FY18 string sentinels, the FY19 note (Cirrus Charter,
      7830611/0611), and the FY21 PPE sentinel (7830629/0629).'
    examples:
    - false
    customProperties:
    - property: column_role
      value: categorical
    - property: label
      value: Is Non Compliant
    - property: short_description
      value: True when the district or school was flagged non-compliant with financial reporting (no star
        rating issued); false when a rating was published.
    - property: null_meaning
      value: NULL wherever no FESR compliance outcome was published — all non-report-year rows, the FY2020-FY2023
        pause, and the numeric-FESR school files (2019/2024) that publish ratings without a flag.
  quality:
  - type: sql
    name: non_empty
    description: The dataset has at least one row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object}
    mustBeGreaterThan: 0
  - type: sql
    name: fte_enrollment_non_negative
    description: fte_enrollment is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE fte_enrollment IS NOT NULL AND fte_enrollment < 0
    mustBe: 0
  - type: sql
    name: pct_of_district_enrollment_within_unit_interval
    description: pct_of_district_enrollment is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_of_district_enrollment IS NOT NULL AND (pct_of_district_enrollment
      < 0 OR pct_of_district_enrollment > 1)
    mustBe: 0
  - type: sql
    name: ccrpi_three_year_avg_within_range
    description: ccrpi_three_year_avg is within its declared [0, 100] range.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE ccrpi_three_year_avg IS NOT NULL AND (ccrpi_three_year_avg
      < 0 OR ccrpi_three_year_avg > 100)
    mustBe: 0
  - type: sql
    name: per_pupil_expenditure_percentile_within_range
    description: per_pupil_expenditure_percentile is within its declared [0, 100] range.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE per_pupil_expenditure_percentile IS NOT NULL AND (per_pupil_expenditure_percentile
      < 0 OR per_pupil_expenditure_percentile > 100)
    mustBe: 0
  - type: sql
    name: fesr_star_rating_within_range
    description: fesr_star_rating is within its declared [0.5, 5] range.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE fesr_star_rating IS NOT NULL AND (fesr_star_rating < 0.5
      OR fesr_star_rating > 5)
    mustBe: 0
  - type: sql
    name: fesr_star_rating_half_step
    description: 'fesr_star_rating is a half-step rating: 2x the value is a whole number (0.5 increments).'
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE fesr_star_rating IS NOT NULL AND (fesr_star_rating * 2)
      != ROUND(fesr_star_rating * 2)
    mustBe: 0
  - type: sql
    name: non_compliant_implies_no_rating
    description: 'Co-null rule: is_non_compliant = TRUE implies fesr_star_rating IS NULL (a non-compliant
      outcome replaces the star rating) at both detail levels.'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE is_non_compliant = TRUE AND fesr_star_rating IS NOT NULL
    mustBe: 0
  - type: sql
    name: fesr_only_in_publication_years
    description: 'Structural fact: FESR is published only in FY2016-FY2019 and FY2024 (program paused
      FY2020-FY2023). The district level starts FY2016, the school level FY2017; no rating exists outside
      these years at either level.'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE fesr_star_rating IS NOT NULL AND year NOT IN (2016, 2017,
      2018, 2019, 2024)
    mustBe: 0
  - type: sql
    name: ppe_consistent_with_total_over_fte
    description: per_pupil_expenditure = total_expenditures / fte_enrollment within $0.05 wherever all
      three are published and enrollment is positive, at BOTH detail levels (source rounds PPE to cents;
      max observed deviation ~$0.021).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE per_pupil_expenditure IS NOT NULL AND total_expenditures
      IS NOT NULL AND fte_enrollment IS NOT NULL AND fte_enrollment > 0 AND ABS(per_pupil_expenditure
      - total_expenditures / fte_enrollment) > 0.05
    mustBe: 0
  - type: sql
    name: per_pupil_components_reconcile
    description: federal_per_pupil_expenditure + state_local_per_pupil_expenditure = per_pupil_expenditure
      within $0.20 wherever all three are published, at both detail levels (canonical blocks reconcile
      within ~$0.016; the loosest rows are two FY17 schools from the 2019 file's re-keyed back-window
      at $0.170).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE per_pupil_expenditure IS NOT NULL AND federal_per_pupil_expenditure
      IS NOT NULL AND state_local_per_pupil_expenditure IS NOT NULL AND ABS(per_pupil_expenditure - (federal_per_pupil_expenditure
      + state_local_per_pupil_expenditure)) > 0.20
    mustBe: 0
  - type: sql
    name: district_expenditure_components_reconcile
    description: 'District rows (school_code IS NULL): federal_expenditures + state_local_expenditures
      = total_expenditures within $1 wherever the breakdown exists (exact to the cent in every gold-source
      block).'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NULL AND total_expenditures IS NOT NULL
      AND federal_expenditures IS NOT NULL AND state_local_expenditures IS NOT NULL AND ABS(federal_expenditures
      + state_local_expenditures - total_expenditures) > 1.0
    mustBe: 0
  - type: sql
    name: school_included_components_reconcile
    description: 'School rows (school_code IS NOT NULL): included_federal_expenditures + included_state_local_expenditures
      = included_expenditures within $1 wherever all three are published (exact in the canonical bronze
      blocks; gold max gap $0.00).'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NOT NULL AND included_expenditures IS NOT
      NULL AND included_federal_expenditures IS NOT NULL AND included_state_local_expenditures IS NOT
      NULL AND ABS(included_expenditures - (included_federal_expenditures + included_state_local_expenditures))
      > 1.0
    mustBe: 0
  - type: sql
    name: school_total_components_reconcile
    description: 'School rows: total_federal_expenditures + total_state_local_expenditures = total_expenditures
      within $10 wherever all three are published (GOSA rounding noise; gold max gap $7.00, FY20).'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NOT NULL AND total_expenditures IS NOT NULL
      AND total_federal_expenditures IS NOT NULL AND total_state_local_expenditures IS NOT NULL AND ABS(total_expenditures
      - (total_federal_expenditures + total_state_local_expenditures)) > 10.0
    mustBe: 0
  - type: sql
    name: district_rolling_metrics_only_on_report_years
    description: District rolling/percentile metrics (per_pupil_expenditure_three_year_avg, ccrpi_three_year_avg,
      per_pupil_expenditure_percentile) exist only on district report-year rows (FY2016-FY2019, FY2024)
      and are NULL on every school row and every other district fiscal year.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE (per_pupil_expenditure_three_year_avg IS NOT NULL OR ccrpi_three_year_avg
      IS NOT NULL OR per_pupil_expenditure_percentile IS NOT NULL) AND (school_code IS NOT NULL OR year
      NOT IN (2016, 2017, 2018, 2019, 2024))
    mustBe: 0
  - type: sql
    name: district_rating_implies_window_metrics_present
    description: On district rows, a published star rating is computed from the rolling window, so a non-NULL
      fesr_star_rating implies per_pupil_expenditure_three_year_avg, ccrpi_three_year_avg, and per_pupil_expenditure_percentile
      are all populated on the same row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NULL AND fesr_star_rating IS NOT NULL AND
      (per_pupil_expenditure_three_year_avg IS NULL OR ccrpi_three_year_avg IS NULL OR per_pupil_expenditure_percentile
      IS NULL)
    mustBe: 0
  - type: sql
    name: school_only_columns_null_on_district_rows
    description: School-only columns (included_*, excluded_expenditures, total_federal/state_local_expenditures,
      pct_of_district_enrollment) must be NULL on every district row (school_code IS NULL) — they have
      no district analog.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NULL AND (included_expenditures IS NOT NULL
      OR included_federal_expenditures IS NOT NULL OR included_state_local_expenditures IS NOT NULL OR
      excluded_expenditures IS NOT NULL OR total_federal_expenditures IS NOT NULL OR total_state_local_expenditures
      IS NOT NULL OR pct_of_district_enrollment IS NOT NULL)
    mustBe: 0
  - type: sql
    name: district_only_columns_null_on_school_rows
    description: District-only columns (federal_expenditures, state_local_expenditures, and the three
      rolling/percentile metrics) must be NULL on every school row (school_code IS NOT NULL).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NOT NULL AND (federal_expenditures IS NOT
      NULL OR state_local_expenditures IS NOT NULL OR per_pupil_expenditure_three_year_avg IS NOT NULL
      OR ccrpi_three_year_avg IS NOT NULL OR per_pupil_expenditure_percentile IS NOT NULL)
    mustBe: 0
  - type: sql
    name: ccrpi_single_score_non_negative
    description: ccrpi_single_score is a 0-100-style score with no upper bound enforced (FY17 early-CCRPI
      challenge points reach ~108.2), but a negative score is impossible.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE ccrpi_single_score IS NOT NULL AND ccrpi_single_score <
      0
    mustBe: 0
  - type: sql
    name: district_code_never_null
    description: Every row (district or school) carries a populated district_code — this topic has no
      state-rollup rows.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE district_code IS NULL
    mustBe: 0
  - type: sql
    name: district_code_length_3_or_7
    description: district_code is a 3-char county/city code or a 7-char charter-authorizer code — any
      other length means the ID formatting regressed.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE LENGTH(district_code) NOT IN (3, 7)
    mustBe: 0
  - type: sql
    name: school_code_length_4_when_present
    description: Where populated (school rows), school_code is zero-padded to exactly 4 characters, matching
      the schools dimension key.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE school_code IS NOT NULL AND LENGTH(school_code) <> 4
    mustBe: 0
  - type: sql
    name: district_universe_complete_per_year
    description: Every fiscal year carries exactly one district row for each of the 180 traditional districts
      (identical code universe in all 9 district bronze files). A different count means rows were dropped
      or a new entity appeared.
    dimension: completeness
    query: SELECT COUNT(*) FROM (SELECT year FROM {object} WHERE school_code IS NULL GROUP BY year HAVING
      COUNT(*) <> 180 OR COUNT(DISTINCT district_code) <> 180) AS bad_years
    mustBe: 0
