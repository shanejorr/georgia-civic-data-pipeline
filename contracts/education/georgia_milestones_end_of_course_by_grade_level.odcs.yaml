apiVersion: v3.1.0
kind: DataContract
id: education.georgia_milestones_end_of_course_by_grade_level
name: georgia_milestones_end_of_course_by_grade_level
version: 1.0.0
status: active
domain: education
tenant: georgia-public-data
description:
  purpose: Georgia Milestones End-of-Course (EOC) assessment results disaggregated by the grade level
    of the test-taker, published by the Governor's Office of Student Achievement (GOSA). Each row is one
    (entity x grade x demographic subgroup x course) combination reporting the number of students tested
    plus the count and percentage at each of four achievement levels (Beginning, Developing, Proficient,
    Distinguished Learner) and two derived cumulative shares. Covers school years 2014-15 through 2023-24
    (2019-20 absent — EOC testing suspended due to COVID-19) at state, district, and school detail levels.
  usage: Star-schema fact table. Join the districts dimension on district_code; the schools dimension
    on district_code + school_code; the demographics dimension on demographic. Read directly with DuckDB
    over Parquet.
  limitations: Suppressed cells are NULL (not zero). State rows have NULL district_code and school_code.
    District rows have NULL school_code.
tags:
- education
- governor's office of student achievement
- georgia_milestones_end_of_course_by_grade_level
servers:
- server: s3_gold
  type: s3
  location: s3://georgia-data-gold/education/georgia_milestones_end_of_course_by_grade_level/**/*.parquet
  format: parquet
- server: local_gold
  type: local
  path: data/gold/education/georgia_milestones_end_of_course_by_grade_level/**/*.parquet
  format: parquet
schema:
- name: georgia_milestones_end_of_course_by_grade_level
  logicalType: object
  physicalType: parquet
  physicalName: georgia_milestones_end_of_course_by_grade_level
  description: georgia_milestones_end_of_course_by_grade_level fact table, year-partitioned Parquet (split
    by detail level where present).
  dataGranularityDescription: One row per year, district_code, school_code, demographic, grade_level,
    subject (geography columns are NULL at higher aggregation levels).
  customProperties:
  - property: sub_topic
    value: gosa
  - property: detail_levels
    value:
    - schools
    - districts
    - states
  - property: default_detail
    value: schools
  - property: grain
    value:
    - year
    - district_code
    - school_code
    - demographic
    - grade_level
    - subject
  - property: key_metric
    value: pct_proficient_learner_or_above
  - property: null_semantics
    value:
      suppressed_to_null: true
      zero_is_real: true
  - property: partition_columns
    value:
    - year
  - property: path_template
    value: education/georgia_milestones_end_of_course_by_grade_level/year={year}/{detail}.parquet
  - property: foreign_keys
    value:
    - column: district_code
      target_object: districts
      target_columns:
      - district_code
      attribute_columns:
      - district_name
      - district_census_id
      - district_type
      scope: domain
    - column: school_code
      target_object: schools
      target_columns:
      - district_code
      - school_code
      attribute_columns:
      - school_name
      scope: domain
    - column: demographic
      target_object: demographics
      target_columns:
      - demographic
      attribute_columns:
      - demographic_label
      - demographic_category
      scope: global
  - property: example_queries
    value:
    - description: Latest year (2024), schools detail
      query: SELECT * FROM georgia_milestones_end_of_course_by_grade_level WHERE year = 2024 LIMIT 100
    - description: District 601 in 2024
      query: SELECT * FROM georgia_milestones_end_of_course_by_grade_level WHERE district_code = '601'
        AND year = 2024 LIMIT 100
    - description: Filter by grade_level = 09
      query: SELECT * FROM georgia_milestones_end_of_course_by_grade_level WHERE grade_level = '09' AND
        year = 2024 LIMIT 100
  properties:
  - name: year
    logicalType: integer
    physicalType: int
    required: true
    description: Ending calendar year of the school year (e.g., 2024 = 2023-24). Derived from the filename
      and cross-checked against the source's LONG_SCHOOL_YEAR. 2020 is absent (EOC testing suspended during
      COVID-19 closures).
    examples:
    - 2024
    customProperties:
    - property: column_role
      value: year
    - property: label
      value: Year
    primaryKey: true
    primaryKeyPosition: 1
  - name: district_code
    logicalType: string
    physicalType: string
    required: false
    description: 'GOSA district code (FK to districts dimension): 3-digit zero-padded county/city codes
      or 7-digit state-charter codes. NULL on state-level rows.'
    examples:
    - '601'
    relationships:
    - to: districts.district_code
    customProperties:
    - property: column_role
      value: fk_district
    - property: label
      value: District Code
    primaryKey: true
    primaryKeyPosition: 2
  - name: school_code
    logicalType: string
    physicalType: string
    required: false
    description: GOSA school code, zero-padded to 4 characters (composite FK to schools dimension with
      district_code; not globally unique on its own). NULL on district- and state-level rows.
    examples:
    - '0386'
    relationships:
    - to: schools.district_code
    - to: schools.school_code
    customProperties:
    - property: column_role
      value: fk_school
    - property: label
      value: School Code
    primaryKey: true
    primaryKeyPosition: 3
  - name: demographic
    logicalType: string
    physicalType: string
    required: true
    description: 'Canonical demographic subgroup code (FK to the global demographics dimension), normalized
      from bronze SUBGROUP_NAME. This topic uses the SPLIT race convention — separate asian and pacific_islander
      rows in every year (no combined asian_pacific_islander bucket). Coverage grew over time: the stable
      18-key core (2015+), plus active_duty and homeless from 2021, with active_duty renamed at the source
      to military_connected from 2022 alongside new foster_care rows. NON-ADDITIVE MILITARY KEYS: active_duty
      (dependents of currently-serving active-duty members) is a subset of military_connected (any DoD-connected
      family) — never sum the two.'
    examples:
    - 'all'
    relationships:
    - to: demographics.demographic
    enum:
    - 'active_duty'
    - 'all'
    - 'asian'
    - 'black'
    - 'economically_disadvantaged'
    - 'english_learners'
    - 'female'
    - 'foster_care'
    - 'hispanic'
    - 'homeless'
    - 'male'
    - 'migrant'
    - 'military_connected'
    - 'multiracial'
    - 'native_american'
    - 'not_economically_disadvantaged'
    - 'not_english_learners'
    - 'not_migrant'
    - 'pacific_islander'
    - 'students_with_disabilities'
    - 'students_without_disabilities'
    - 'white'
    customProperties:
    - property: column_role
      value: fk_demographic
    - property: label
      value: Demographic
    - property: short_description
      value: Demographic subgroup the row reports; 'all' is the overall figure (subgroups are non-additive).
    - property: has_total
      value: true
    - property: total_value
      value: 'all'
    - property: key_metric_grain_contributor
      value: true
    primaryKey: true
    primaryKeyPosition: 4
  - name: grade_level
    logicalType: string
    physicalType: string
    required: true
    description: Grade level of the test-takers this row represents, as a 2-char zero-padded string. Bronze
      ACDMC_LVL is unpadded (7..12) in 2015-2019 and zero-padded (07..12) in 2021-2024; gold normalizes
      both to 07-12. Grade 7 is rare (the small set of 7th graders taking EOC courses early); grade 12
      includes retake/make-up administrations.
    examples:
    - '09'
    enum:
    - '07'
    - '08'
    - '09'
    - '10'
    - '11'
    - '12'
    customProperties:
    - property: column_role
      value: categorical
    - property: label
      value: Grade Level
    - property: short_description
      value: Grade level of the test-takers, 07-12; grade 7 is rare and grade 12 includes retakes.
    - property: has_total
      value: false
    - property: key_metric_grain_contributor
      value: true
    primaryKey: true
    primaryKeyPosition: 5
  - name: subject
    logicalType: string
    physicalType: string
    required: true
    description: 'EOC course assessed, snake_case canonical. The value set tracks real curriculum changes:
      9th_grade_literature_and_composition, analytic_geometry, economics_business_free_enterprise, geometry,
      and physical_science were retired after 2021; algebra_i and geometry first administered 2016; algebra_concepts_and_connections
      added 2024 (replacing coordinate_algebra over time). Historical course identities are preserved
      — algebra_i, coordinate_algebra, and algebra_concepts_and_connections are distinct courses, not
      aliases.'
    examples:
    - 'biology'
    enum:
    - '9th_grade_literature_and_composition'
    - 'algebra_concepts_and_connections'
    - 'algebra_i'
    - 'american_literature_and_composition'
    - 'analytic_geometry'
    - 'biology'
    - 'coordinate_algebra'
    - 'economics_business_free_enterprise'
    - 'geometry'
    - 'physical_science'
    - 'us_history'
    customProperties:
    - property: column_role
      value: categorical
    - property: label
      value: Subject
    - property: short_description
      value: EOC course assessed (e.g. biology, algebra_i, us_history); the value set tracks curriculum
        changes over time.
    - property: has_total
      value: false
    - property: key_metric_grain_contributor
      value: true
    primaryKey: true
    primaryKeyPosition: 6
  - name: num_tested
    logicalType: integer
    physicalType: bigint
    required: false
    description: Count of students in this grade tested on this EOC course in this (entity x demographic)
      cell. Includes test-takers without a valid achievement-level score, so it can exceed the sum of
      the four num_*_learner counts (observed in 2023-2024; the sum never exceeds num_tested). Suppressed
      (NULL) in every year, most heavily in 2024 (~55% of rows) where the pct_* columns still carry the
      rounded distribution.
    examples:
    - 33
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Number Tested
    - property: unit
      value: count
    - property: null_meaning
      value: 'Suppressed by GOSA (TFS, ''Too Few Students''). Affects every year: ~7-8% of rows in 2015-2019,
        ~5-8% in 2021-2023, and ~55% in 2024 when GOSA broadened suppression of this column.'
    - property: metric_component
      value: denominator
  - name: num_beginning_learner
    logicalType: integer
    physicalType: bigint
    required: false
    description: Count of students scoring Beginning Learner (lowest of the four achievement levels).
      Bronze BEGIN_CNT; NULL when suppressed (TFS string, or — on the fully-suppressed rows of every 2015-2019
      file — genuine empty CSV fields).
    examples:
    - 30
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Number Beginning Learner
    - property: unit
      value: count
    - property: null_meaning
      value: Suppressed by GOSA (TFS, 'Too Few Students').
  - name: num_developing_learner
    logicalType: integer
    physicalType: bigint
    required: false
    description: 'Count of students scoring Developing Learner. Bronze DEVELOPING_CNT. 2017 ANOMALY: the
      2017 source file is the only year/column where suppression was ENTIRELY absent (zero TFS markers)
      — it carries 3,001 literal 0 values and a ~7% null rate vs 43-75% in every other year, conflating
      true zeros with small counts the publisher should have suppressed. Two sibling columns show the
      same published-zero irregularity in single years (num_distinguished_learner 2015: 4,940 zeros; num_proficient_learner
      2017: 824 zeros — see those columns); no other year/column pair has any literal zeros. Bronze-faithful
      pass-through; do not compare 2017 values for this column directly against other years.'
    examples:
    - 15
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Number Developing Learner
    - property: unit
      value: count
    - property: null_meaning
      value: Suppressed by GOSA (TFS) — except 2017, where the source failed to suppress this column.
  - name: num_proficient_learner
    logicalType: integer
    physicalType: bigint
    required: false
    description: 'Count of students scoring Proficient Learner. Bronze PROFICIENT_CNT; NULL when suppressed.
      2017 CAVEAT: the 2017 source published 824 literal 0 values for this column (TFS suppression was
      still applied to 47,937 other cells) — no other year has any. The zeros conflate true zeros with
      small counts that would normally be suppressed; bronze-faithful pass-through.'
    examples:
    - 12
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Number Proficient Learner
    - property: unit
      value: count
    - property: null_meaning
      value: Suppressed by GOSA (TFS, 'Too Few Students').
  - name: num_distinguished_learner
    logicalType: integer
    physicalType: bigint
    required: false
    description: 'Count of students scoring Distinguished Learner (highest level). The most heavily suppressed
      metric (~80% NULL in 2023, ~88% in 2024) — few cells have enough distinguished scorers to clear
      the threshold. 2015 CAVEAT: the 2015 source published 4,940 literal 0 values for this column (TFS
      suppression was still applied to 48,267 other cells), depressing the 2015 null rate to ~52% vs 75-79%
      in 2016-2019 (2015 min is 0 vs 10 elsewhere); no other year has any. The zeros conflate true zeros
      with small counts that would normally be suppressed — do not compare 2015 values for this column
      directly against later years; bronze-faithful pass-through.'
    examples:
    - 5
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Number Distinguished Learner
    - property: unit
      value: count
    - property: null_meaning
      value: Suppressed by GOSA (TFS, 'Too Few Students').
  - name: pct_beginning_learner
    logicalType: number
    physicalType: double
    required: false
    description: Share of tested students scoring Beginning Learner, 0-1 scale (bronze 0-100 divided by
      100). In 2015-2023 NULL exactly when num_tested is NULL (fully suppressed cell); in 2024 always
      reported — GOSA publishes the rounded distribution even when every count is suppressed. The four
      pct_*_learner shares are computed against num_tested and can sum to less than 1.0 when some test-takers
      lack a valid achievement-level score (pronounced in 2023-2024); they never sum above ~1.002 (rounding).
    examples:
    - 0.909
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Beginning Learner
    - property: unit
      value: proportion
    - property: null_meaning
      value: Suppressed by GOSA — in 2015-2023 exactly when num_tested is suppressed; never NULL in 2024.
  - name: pct_developing_learner
    logicalType: number
    physicalType: double
    required: false
    description: Share of tested students scoring Developing Learner, 0-1 scale. Same suppression and
      partition behavior as pct_beginning_learner.
    examples:
    - 0.091
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Developing Learner
    - property: unit
      value: proportion
    - property: null_meaning
      value: Suppressed by GOSA — in 2015-2023 exactly when num_tested is suppressed; never NULL in 2024.
  - name: pct_proficient_learner
    logicalType: number
    physicalType: double
    required: false
    description: Share of tested students scoring Proficient Learner, 0-1 scale. Same suppression and
      partition behavior as pct_beginning_learner.
    examples:
    - 0.25
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Proficient Learner
    - property: unit
      value: proportion
    - property: null_meaning
      value: Suppressed by GOSA — in 2015-2023 exactly when num_tested is suppressed; never NULL in 2024.
  - name: pct_distinguished_learner
    logicalType: number
    physicalType: double
    required: false
    description: Share of tested students scoring Distinguished Learner, 0-1 scale. Same suppression and
      partition behavior as pct_beginning_learner.
    examples:
    - 0.104
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Distinguished Learner
    - property: unit
      value: proportion
    - property: null_meaning
      value: Suppressed by GOSA — in 2015-2023 exactly when num_tested is suppressed; never NULL in 2024.
  - name: pct_developing_learner_or_above
    logicalType: number
    physicalType: double
    required: false
    description: Cumulative share at Developing Learner or higher, derived at transform time as pct_developing_learner
      + pct_proficient_learner + pct_distinguished_learner (0-1 scale). Sums of publisher-rounded shares
      landing within 0.005 above 1.0 are capped to 1.0. NULL whenever any summand is NULL.
    examples:
    - 0.605
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Developing Learner or Above
    - property: unit
      value: proportion
    - property: null_meaning
      value: NULL whenever any of the three summand shares is NULL (suppression propagates).
  - name: pct_proficient_learner_or_above
    logicalType: number
    physicalType: double
    required: false
    description: Cumulative share at Proficient Learner or higher (the headline 'proficiency rate'), derived
      at transform time as pct_proficient_learner + pct_distinguished_learner (0-1 scale). Sums of publisher-rounded
      shares landing within 0.005 above 1.0 are capped to 1.0. NULL whenever either summand is NULL.
    examples:
    - 0.354
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Percent Proficient Learner or Above
    - property: short_description
      value: Share of tested students scoring Proficient Learner or higher, on a 0-1 scale (the headline
        EOC proficiency rate).
    - property: unit
      value: proportion
    - property: null_meaning
      value: NULL whenever either summand share is NULL (suppression propagates).
    - property: key_metric
      value: true
  quality:
  - type: sql
    name: non_empty
    description: The dataset has at least one row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object}
    mustBeGreaterThan: 0
  - type: sql
    name: demographic_in_allowed_values
    description: demographic is one of the 22 canonical codes.
    dimension: conformity
    query: SELECT COUNT(*) FROM {object} WHERE demographic IS NOT NULL AND demographic NOT IN ('active_duty',
      'all', 'asian', 'black', 'economically_disadvantaged', 'english_learners', 'female', 'foster_care',
      'hispanic', 'homeless', 'male', 'migrant', 'military_connected', 'multiracial', 'native_american',
      'not_economically_disadvantaged', 'not_english_learners', 'not_migrant', 'pacific_islander', 'students_with_disabilities',
      'students_without_disabilities', 'white')
    mustBe: 0
  - type: sql
    name: grade_level_in_allowed_values
    description: grade_level is one of the 6 canonical codes.
    dimension: conformity
    query: SELECT COUNT(*) FROM {object} WHERE grade_level IS NOT NULL AND grade_level NOT IN ('07', '08',
      '09', '10', '11', '12')
    mustBe: 0
  - type: sql
    name: subject_in_allowed_values
    description: subject is one of the 11 canonical codes.
    dimension: conformity
    query: SELECT COUNT(*) FROM {object} WHERE subject IS NOT NULL AND subject NOT IN ('9th_grade_literature_and_composition',
      'algebra_concepts_and_connections', 'algebra_i', 'american_literature_and_composition', 'analytic_geometry',
      'biology', 'coordinate_algebra', 'economics_business_free_enterprise', 'geometry', 'physical_science',
      'us_history')
    mustBe: 0
  - type: sql
    name: num_tested_non_negative
    description: num_tested is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE num_tested IS NOT NULL AND num_tested < 0
    mustBe: 0
  - type: sql
    name: num_beginning_learner_non_negative
    description: num_beginning_learner is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE num_beginning_learner IS NOT NULL AND num_beginning_learner
      < 0
    mustBe: 0
  - type: sql
    name: num_developing_learner_non_negative
    description: num_developing_learner is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE num_developing_learner IS NOT NULL AND num_developing_learner
      < 0
    mustBe: 0
  - type: sql
    name: num_proficient_learner_non_negative
    description: num_proficient_learner is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE num_proficient_learner IS NOT NULL AND num_proficient_learner
      < 0
    mustBe: 0
  - type: sql
    name: num_distinguished_learner_non_negative
    description: num_distinguished_learner is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE num_distinguished_learner IS NOT NULL AND num_distinguished_learner
      < 0
    mustBe: 0
  - type: sql
    name: pct_beginning_learner_within_unit_interval
    description: pct_beginning_learner is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_beginning_learner IS NOT NULL AND (pct_beginning_learner
      < 0 OR pct_beginning_learner > 1)
    mustBe: 0
  - type: sql
    name: pct_developing_learner_within_unit_interval
    description: pct_developing_learner is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_developing_learner IS NOT NULL AND (pct_developing_learner
      < 0 OR pct_developing_learner > 1)
    mustBe: 0
  - type: sql
    name: pct_proficient_learner_within_unit_interval
    description: pct_proficient_learner is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_proficient_learner IS NOT NULL AND (pct_proficient_learner
      < 0 OR pct_proficient_learner > 1)
    mustBe: 0
  - type: sql
    name: pct_distinguished_learner_within_unit_interval
    description: pct_distinguished_learner is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_distinguished_learner IS NOT NULL AND (pct_distinguished_learner
      < 0 OR pct_distinguished_learner > 1)
    mustBe: 0
  - type: sql
    name: pct_developing_learner_or_above_within_unit_interval
    description: pct_developing_learner_or_above is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_developing_learner_or_above IS NOT NULL AND (pct_developing_learner_or_above
      < 0 OR pct_developing_learner_or_above > 1)
    mustBe: 0
  - type: sql
    name: pct_proficient_learner_or_above_within_unit_interval
    description: pct_proficient_learner_or_above is a bounded proportion on the [0, 1] scale.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE pct_proficient_learner_or_above IS NOT NULL AND (pct_proficient_learner_or_above
      < 0 OR pct_proficient_learner_or_above > 1)
    mustBe: 0
  - type: sql
    name: pcts_present_when_num_tested_reported
    description: In every source year, a reported (non-NULL) num_tested implies all four achievement-level
      shares are reported (verified in bronze 2015-2024 with zero exceptions).
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE num_tested IS NOT NULL AND (pct_beginning_learner IS NULL
      OR pct_developing_learner IS NULL OR pct_proficient_learner IS NULL OR pct_distinguished_learner
      IS NULL)
    mustBe: 0
  - type: sql
    name: pct_levels_never_null_in_2024
    description: 'The 2024 source publishes the rounded achievement-level distribution on every row, even
      when all counts are suppressed (verified: 0 NULLs across 138,747 rows x 4 shares) — the fact that
      makes 2024''s suppressed-cell percentages usable signal. Guards the served ''never NULL in 2024''
      claim against a future re-publish or transform regression.'
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE year = 2024 AND (pct_beginning_learner IS NULL OR pct_developing_learner
      IS NULL OR pct_proficient_learner IS NULL OR pct_distinguished_learner IS NULL)
    mustBe: 0
  - type: sql
    name: pre_2024_full_suppression_co_null
    description: 'Through 2023, a suppressed num_tested means the whole cell is suppressed: all four achievement-level
      shares must also be NULL. (2024 broke this pattern at the source — shares are published even when
      counts are suppressed — so the rule is scoped to year < 2024.)'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE year < 2024 AND num_tested IS NULL AND (pct_beginning_learner
      IS NOT NULL OR pct_developing_learner IS NOT NULL OR pct_proficient_learner IS NOT NULL OR pct_distinguished_learner
      IS NOT NULL)
    mustBe: 0
  - type: sql
    name: level_counts_sum_le_num_tested
    description: Where all four achievement-level counts and num_tested are reported, the level counts
      sum to at most num_tested (exact equality holds 2015-2022; 2023-2024 undershoot because test-takers
      without a valid achievement-level score are in num_tested but no band; the sum never exceeds it
      in any source year).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE num_tested IS NOT NULL AND num_beginning_learner IS NOT
      NULL AND num_developing_learner IS NOT NULL AND num_proficient_learner IS NOT NULL AND num_distinguished_learner
      IS NOT NULL AND (num_beginning_learner + num_developing_learner + num_proficient_learner + num_distinguished_learner)
      > num_tested
    mustBe: 0
  - type: sql
    name: no_level_count_exceeds_num_tested
    description: No single achievement-level count may exceed the number of students tested in the same
      cell.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE num_tested IS NOT NULL AND (num_beginning_learner > num_tested
      OR num_developing_learner > num_tested OR num_proficient_learner > num_tested OR num_distinguished_learner
      > num_tested)
    mustBe: 0
  - type: sql
    name: pct_levels_sum_at_most_one_within_rounding
    description: 'Where all four shares are reported, their sum may not exceed 1.0 by more than publisher
      rounding (bronze max observed: 100.2 on the 0-100 scale). The sum CAN legitimately fall below 1.0
      (test-takers without a valid achievement-level score), so no lower bound is asserted.'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE pct_beginning_learner IS NOT NULL AND pct_developing_learner
      IS NOT NULL AND pct_proficient_learner IS NOT NULL AND pct_distinguished_learner IS NOT NULL AND
      (pct_beginning_learner + pct_developing_learner + pct_proficient_learner + pct_distinguished_learner)
      > 1.0025
    mustBe: 0
  - type: sql
    name: developing_or_above_equals_component_sum
    description: pct_developing_learner_or_above equals pct_developing_learner + pct_proficient_learner
      + pct_distinguished_learner within the 0.005 rounding-cap tolerance, and is non-NULL whenever all
      three summands are non-NULL.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE pct_developing_learner IS NOT NULL AND pct_proficient_learner
      IS NOT NULL AND pct_distinguished_learner IS NOT NULL AND (pct_developing_learner_or_above IS NULL
      OR ABS(pct_developing_learner_or_above - (pct_developing_learner + pct_proficient_learner + pct_distinguished_learner))
      > 0.0051)
    mustBe: 0
  - type: sql
    name: proficient_or_above_equals_component_sum
    description: pct_proficient_learner_or_above equals pct_proficient_learner + pct_distinguished_learner
      within the 0.005 rounding-cap tolerance, and is non-NULL whenever both summands are non-NULL.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE pct_proficient_learner IS NOT NULL AND pct_distinguished_learner
      IS NOT NULL AND (pct_proficient_learner_or_above IS NULL OR ABS(pct_proficient_learner_or_above
      - (pct_proficient_learner + pct_distinguished_learner)) > 0.0051)
    mustBe: 0
  - type: sql
    name: subject_curriculum_year_ranges
    description: 'Course availability matches the verified curriculum timeline: the five courses retired
      after 2021 (9th_grade_literature_and_composition, analytic_geometry, economics_business_free_enterprise,
      geometry, physical_science) never appear after 2021; algebra_concepts_and_connections only from
      2024; algebra_i and geometry not before 2016.'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE (subject IN ('9th_grade_literature_and_composition', 'analytic_geometry',
      'economics_business_free_enterprise', 'geometry', 'physical_science') AND year > 2021) OR (subject
      = 'algebra_concepts_and_connections' AND year < 2024) OR (subject IN ('algebra_i', 'geometry') AND
      year < 2016)
    mustBe: 0
