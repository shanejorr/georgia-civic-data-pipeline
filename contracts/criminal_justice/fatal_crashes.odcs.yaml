apiVersion: v3.1.0
kind: DataContract
id: criminal_justice.fatal_crashes
name: fatal_crashes
version: 1.0.0
status: active
domain: criminal_justice
tenant: georgia-public-data
description:
  purpose: 'Fatal motor-vehicle traffic crashes and traffic fatalities per Georgia county per year, 1975-2024,
    from NHTSA''s Fatality Analysis Reporting System (FARS) — the federal census of every crash on a public
    road with at least one death within 30 days. One row per county per year (all 159 counties every year;
    county-years with no fatal crash are real zeros, not missing data) plus one statewide row per year.
    Metrics: fatal crash count, total deaths, and (1975-2020) crashes involving at least one drinking
    driver as reported by police. Fatal crashes only — this is not total crash volume.'
  usage: 'Cite NHTSA FARS (US DOT; public domain). traffic_fatalities is the headline metric. Zeros are
    real: a county-year with 0 means no fatal crash occurred there. Use statewide rows for state totals
    — they include the few crashes with unknown county (county rows can sum slightly lower in 1975-2006).
    Do not present fatal_crashes as total crash volume (FARS excludes non-fatal crashes), and do not compare
    crashes_with_drunk_driver to NHTSA''s imputed-BAC alcohol-impaired series.'
  limitations: State rows have NULL county_fips. Fatal crashes only — no injury-only or property-damage
    crashes, so this is not total crash volume. crashes_with_drunk_driver covers 1975-2020 only (NHTSA
    dropped the police-reported DRUNK_DR variable after 2020; NULL thereafter) and undercounts alcohol
    involvement relative to NHTSA's imputed-BAC series. 126 crashes across 1975-2006 have unknown/invalid
    county codes and count at state level only, so county rows sum to slightly less than the statewide
    row in those years. Counts are by state/county of crash occurrence, not victim residence.
tags:
- criminal_justice
- nhtsa fatality analysis reporting system
- fatal_crashes
servers:
- server: s3_gold
  type: s3
  location: s3://georgia-data-gold/criminal_justice/fatal_crashes/**/*.parquet
  format: parquet
- server: local_gold
  type: local
  path: data/gold/criminal_justice/fatal_crashes/**/*.parquet
  format: parquet
schema:
- name: fatal_crashes
  logicalType: object
  physicalType: parquet
  physicalName: fatal_crashes
  description: fatal_crashes fact table, year-partitioned Parquet (split by detail level where present).
  dataGranularityDescription: One row per year, county_fips (geography columns are NULL at higher aggregation
    levels).
  customProperties:
  - property: sub_topic
    value: traffic_safety
  - property: detail_levels
    value:
    - counties
    - states
  - property: default_detail
    value: counties
  - property: grain
    value:
    - year
    - county_fips
  - property: key_metric
    value: traffic_fatalities
  - property: null_semantics
    value:
      suppressed_to_null: false
      zero_is_real: true
  - property: partition_columns
    value:
    - year
  - property: path_template
    value: criminal_justice/fatal_crashes/year={year}/{detail}.parquet
  - property: foreign_keys
    value:
    - column: county_fips
      target_object: counties
      target_columns:
      - county_fips
      attribute_columns:
      - county_name
      scope: global
  - property: example_queries
    value:
    - description: Latest year (2024), counties detail
      query: SELECT * FROM fatal_crashes WHERE year = 2024 LIMIT 100
  properties:
  - name: year
    logicalType: integer
    physicalType: int
    required: true
    description: Calendar year of the crash (FARS data year; verified equal to the source file year for
      all 50 files).
    examples:
    - 2024
    customProperties:
    - property: column_role
      value: year
    - property: label
      value: Year
    primaryKey: true
    primaryKeyPosition: 1
  - name: county_fips
    logicalType: string
    physicalType: string
    required: false
    description: '5-digit county FIPS code (state prefix 13) of the county where the crash occurred; FK
      to the counties dimension. NULL on statewide rollup rows. Derived from the FARS GSA/GLC county code,
      which for Georgia equals the 3-digit county FIPS suffix (verified against the FARS county-name labels
      with zero mismatches). 126 crashes across 1975-2006 carry unknown/invalid county codes at source
      (e.g. code 999 = unknown) — those crashes count in the statewide row only, so county rows can sum
      to slightly less than the statewide row in those years (worst gap: 27 crashes in 1980).'
    examples:
    - '13121'
    relationships:
    - to: counties.county_fips
    customProperties:
    - property: column_role
      value: fk_county
    - property: label
      value: County FIPS
    - property: null_meaning
      value: NULL on statewide rollup rows.
    primaryKey: true
    primaryKeyPosition: 2
  - name: fatal_crashes
    logicalType: integer
    physicalType: bigint
    required: true
    description: Number of fatal motor-vehicle traffic crashes (crashes with at least one death within
      30 days) in the county that year. FARS is a census, so 0 is a real zero — the county had no fatal
      crash that year. Fatal crashes only; never interpret as total crash volume.
    examples:
    - 87
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Fatal Crashes
    - property: unit
      value: count
  - name: traffic_fatalities
    logicalType: integer
    physicalType: bigint
    required: true
    description: 'Number of people killed in those crashes (deaths within 30 days of the crash, per the
      FARS FATALS count). Always >= fatal_crashes on rows with any crashes, since every fatal crash has
      at least one death (per-crash deaths observed: 1-7). Counted by county/state of crash occurrence,
      matching NHTSA''s published state fatality series.'
    examples:
    - 95
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Traffic Fatalities
    - property: unit
      value: count
    - property: key_metric
      value: true
  - name: crashes_with_drunk_driver
    logicalType: integer
    physicalType: bigint
    required: false
    description: Number of fatal crashes involving at least one drinking driver, per the police-reported
      FARS DRUNK_DR count (values 0-4 observed; no unknown sentinels in any Georgia year). Available 1975-2020
      only — NHTSA dropped DRUNK_DR from 2021 on, so the column is NULL (not 0) for 2021+. This is the
      simple police-reported drinking-driver flag, NOT NHTSA's published 'alcohol-impaired-driving' fatality
      series (which uses multiply-imputed driver BAC >= .08 and is not comparable); police-reported drinking
      is typically an undercount of alcohol involvement.
    examples:
    - 20
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Crashes with Drunk Driver
    - property: unit
      value: count
    - property: null_meaning
      value: 'NULL for 2021 onward: NHTSA dropped the DRUNK_DR variable after data year 2020, so the metric
        is unpublished (not zero) in those years.'
  quality:
  - type: sql
    name: non_empty
    description: The dataset has at least one row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object}
    mustBeGreaterThan: 0
  - type: sql
    name: fatal_crashes_non_negative
    description: fatal_crashes is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE fatal_crashes IS NOT NULL AND fatal_crashes < 0
    mustBe: 0
  - type: sql
    name: traffic_fatalities_non_negative
    description: traffic_fatalities is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE traffic_fatalities IS NOT NULL AND traffic_fatalities <
      0
    mustBe: 0
  - type: sql
    name: crashes_with_drunk_driver_non_negative
    description: crashes_with_drunk_driver is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE crashes_with_drunk_driver IS NOT NULL AND crashes_with_drunk_driver
      < 0
    mustBe: 0
  - type: sql
    name: fatalities_gte_crashes
    description: Every fatal crash kills at least one person, so traffic_fatalities must be >= fatal_crashes
      on every row (equality only when both are 0 or every crash had exactly one death).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE fatal_crashes IS NOT NULL AND traffic_fatalities IS NOT
      NULL AND traffic_fatalities < fatal_crashes
    mustBe: 0
  - type: sql
    name: zero_crashes_implies_zero_fatalities
    description: A county-year with no fatal crashes can have no traffic deaths — fatalities must be 0
      wherever fatal_crashes is 0 (the densified true-zero rows).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE fatal_crashes = 0 AND traffic_fatalities != 0
    mustBe: 0
  - type: sql
    name: drunk_driver_crashes_subset_of_crashes
    description: Crashes with a drinking driver are a subset of all fatal crashes — the count can never
      exceed fatal_crashes.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE crashes_with_drunk_driver IS NOT NULL AND crashes_with_drunk_driver
      > fatal_crashes
    mustBe: 0
  - type: sql
    name: drunk_driver_metric_era_coverage
    description: The police-reported DRUNK_DR variable exists for data years 1975-2020 and was dropped
      permanently from 2021 — crashes_with_drunk_driver must be populated (0 is real) through 2020 and
      NULL from 2021 on, on every row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE (year <= 2020 AND crashes_with_drunk_driver IS NULL) OR
      (year >= 2021 AND crashes_with_drunk_driver IS NOT NULL)
    mustBe: 0
  - type: sql
    name: all_159_counties_every_year
    description: FARS is a census and the county grid is densified — every year must carry exactly 159
      county rows (true zeros included).
    dimension: completeness
    query: SELECT COUNT(*) FROM (SELECT year, COUNT(CASE WHEN county_fips IS NOT NULL THEN 1 END) AS n_counties
      FROM {object} GROUP BY year) WHERE n_counties != 159
    mustBe: 0
  - type: sql
    name: one_state_row_every_year
    description: Exactly one statewide rollup row per year (Georgia has fatal crashes in every FARS year).
    dimension: completeness
    query: SELECT COUNT(*) FROM (SELECT year, COUNT(CASE WHEN county_fips IS NULL THEN 1 END) AS n_state
      FROM {object} GROUP BY year) WHERE n_state != 1
    mustBe: 0
  - type: sql
    name: state_fatal_crashes_gte_county_sum
    description: Statewide rows include the few crashes with unknown county codes (excluded from county
      rows), so the state fatal_crashes must be >= the sum of the county rows for every year — never less.
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, MAX(CASE WHEN county_fips IS NULL THEN fatal_crashes END)
      AS state_total, SUM(CASE WHEN county_fips IS NOT NULL THEN fatal_crashes END) AS county_sum FROM
      {object} GROUP BY year) WHERE state_total IS NOT NULL AND county_sum IS NOT NULL AND state_total
      < county_sum
    mustBe: 0
  - type: sql
    name: state_traffic_fatalities_gte_county_sum
    description: Statewide rows include the few crashes with unknown county codes (excluded from county
      rows), so the state traffic_fatalities must be >= the sum of the county rows for every year — never
      less.
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, MAX(CASE WHEN county_fips IS NULL THEN traffic_fatalities
      END) AS state_total, SUM(CASE WHEN county_fips IS NOT NULL THEN traffic_fatalities END) AS county_sum
      FROM {object} GROUP BY year) WHERE state_total IS NOT NULL AND county_sum IS NOT NULL AND state_total
      < county_sum
    mustBe: 0
  - type: sql
    name: state_crashes_with_drunk_driver_gte_county_sum
    description: Statewide rows include the few crashes with unknown county codes (excluded from county
      rows), so the state crashes_with_drunk_driver must be >= the sum of the county rows for every year
      — never less.
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, MAX(CASE WHEN county_fips IS NULL THEN crashes_with_drunk_driver
      END) AS state_total, SUM(CASE WHEN county_fips IS NOT NULL THEN crashes_with_drunk_driver END) AS
      county_sum FROM {object} GROUP BY year) WHERE state_total IS NOT NULL AND county_sum IS NOT NULL
      AND state_total < county_sum
    mustBe: 0
customProperties:
- property: title
  value: Fatal Traffic Crashes by County
- property: summary
  value: Annual fatal motor-vehicle crash and traffic fatality counts for each Georgia county from the
    federal FARS census, 1975 onward.
- property: source
  value: NHTSA Fatality Analysis Reporting System (FARS)
- property: source_url
  value: https://www.nhtsa.gov/research-data/fatality-analysis-reporting-system-fars
- property: update_frequency
  value: annual
- property: year_range
  value: 1975-2024
- property: schema_hash
  value: ff74843cd70be4c3f61b4b8dbf5691ef2520065098bd90c74d018353d232942e
