apiVersion: v3.1.0
kind: DataContract
id: criminal_justice.gsp_traffic_stops
name: gsp_traffic_stops
version: 1.0.0
status: active
domain: criminal_justice
tenant: georgia-public-data
description:
  purpose: 'Traffic stops by the Georgia State Patrol (Georgia Department of Public Safety), counted per
    county, year, and driver race group from the Stanford Open Policing Project''s standardized stop-level
    records, 2012-2016. IMPORTANT SCOPE: every stop in this dataset resulted in a WARNING — Georgia supplied
    warnings-only data with no citation, arrest, search, or contraband fields — so it supports stop-volume
    and stop-composition analysis only (who gets stopped, where), never search-rate, hit-rate, citation,
    or arrest-disparity metrics. Single agency: state patrol stops only, not municipal police or sheriff''s
    office stops. Driver race was not recorded for 47.1% of stops, served as the race_unknown group so
    race groups always sum to the all row.'
  usage: Attribute the Stanford Open Policing Project (openpolicing.stanford.edu); the data is licensed
    ODC-BY 1.0 (Open Data Commons Attribution License). Filter demographic = 'all' for total stop volume,
    or exclude 'all' to compare race groups (they are mutually exclusive and sum to the all row). Always
    interpret race composition alongside the race_unknown share — driver race is unrecorded for 47.1%
    of stops overall and the share varies by county and year. This dataset measures state-patrol warning
    stops only; do not treat it as total traffic enforcement in a county, and do not derive search, citation,
    or arrest metrics from it (none exist for Georgia).
  limitations: 'State rows have NULL county_fips. Warnings-only, single-agency data: Georgia supplied
    only Georgia State Patrol / Department of Public Safety stops that resulted in warnings — no citation,
    arrest, search, or contraband fields exist, so the dataset supports stop-volume and stop-composition
    analysis only, and it excludes municipal police and sheriff stops. Driver race is not recorded for
    47.1% of stops (served as race_unknown); race-group shares carry that denominator caveat. 10 of 1,906,772
    stops carry unmappable county labels and are excluded from county rows but included in statewide rows,
    so county rows sum at most 10 stops below the statewide row. Coverage is frozen at 2012-2016; rows
    before calendar year 2000 are excluded by a project-wide floor (none occur in this source). A residual
    302 stops carry Department of Natural Resources or Georgia State Patrol agency labels rather than
    the Department of Public Safety label and are included. The source has no suppression: cells exist
    only where stops occurred, and counts are never NULL.'
tags:
- criminal_justice
- stanford open policing project — georgia statewide traffic stops
- gsp_traffic_stops
servers:
- server: s3_gold
  type: s3
  location: s3://georgia-data-gold/criminal_justice/gsp_traffic_stops/**/*.parquet
  format: parquet
- server: local_gold
  type: local
  path: data/gold/criminal_justice/gsp_traffic_stops/**/*.parquet
  format: parquet
schema:
- name: gsp_traffic_stops
  logicalType: object
  physicalType: parquet
  physicalName: gsp_traffic_stops
  description: gsp_traffic_stops fact table, year-partitioned Parquet (split by detail level where present).
  dataGranularityDescription: One row per year, county_fips, demographic (geography columns are NULL at
    higher aggregation levels).
  customProperties:
  - property: sub_topic
    value: open_policing
  - property: detail_levels
    value:
    - counties
    - states
  - property: default_detail
    value: counties
  - property: grain
    value:
    - year
    - county_fips
    - demographic
  - property: key_metric
    value: traffic_stops
  - property: null_semantics
    value:
      suppressed_to_null: false
      zero_is_real: true
  - property: partition_columns
    value:
    - year
  - property: path_template
    value: criminal_justice/gsp_traffic_stops/year={year}/{detail}.parquet
  - property: foreign_keys
    value:
    - column: county_fips
      target_object: counties
      target_columns:
      - county_fips
      attribute_columns:
      - county_name
      scope: global
    - column: demographic
      target_object: demographics
      target_columns:
      - demographic
      attribute_columns:
      - demographic_label
      - demographic_category
      scope: global
  - property: example_queries
    value:
    - description: Latest year (2016), counties detail
      query: SELECT * FROM gsp_traffic_stops WHERE year = 2016 LIMIT 100
  properties:
  - name: year
    logicalType: integer
    physicalType: int
    required: true
    description: Calendar year of the stop, derived from the stop date. Coverage is 2012-2016 and frozen
      (the source project no longer updates); rows before 2000 are excluded by a project-wide floor (none
      occur in this source).
    examples:
    - 2014
    customProperties:
    - property: column_role
      value: year
    - property: label
      value: Year
    primaryKey: true
    primaryKeyPosition: 1
  - name: county_fips
    logicalType: string
    physicalType: string
    required: false
    description: 5-digit county FIPS code (state prefix 13) of the county where the stop occurred; FK
      to the counties dimension. NULL on statewide rollup rows. 10 of 1,906,772 stops (9 under G-code
      placeholder county labels, 1 with no county recorded) cannot be mapped to a county and are counted
      only in the statewide rows.
    examples:
    - '13121'
    relationships:
    - to: counties.county_fips
    customProperties:
    - property: column_role
      value: fk_county
    - property: label
      value: County FIPS
    - property: null_meaning
      value: NULL on statewide rollup rows.
    primaryKey: true
    primaryKeyPosition: 2
  - name: demographic
    logicalType: string
    physicalType: string
    required: true
    description: Driver race group. 'all' is the unfiltered total; the remaining values are the source's
      standardized, mutually exclusive race buckets plus race_unknown, and together they partition the
      all row exactly — summing the six non-all values reproduces it. asian_pacific_islander is the source's
      combined bucket (no separate Asian or Pacific Islander values exist anywhere in the source). hispanic
      is an exclusive bucket (other buckets exclude Hispanic drivers), and the source's standardization
      folds Native American drivers into 'other'. race_unknown covers stops where driver race was not
      recorded — 47.1% of all stops, so compare race-group shares with that denominator caveat in mind.
    examples:
    - 'all'
    relationships:
    - to: demographics.demographic
    enum:
    - 'all'
    - 'asian_pacific_islander'
    - 'black'
    - 'hispanic'
    - 'other'
    - 'race_unknown'
    - 'white'
    customProperties:
    - property: column_role
      value: fk_demographic
    - property: label
      value: Demographic
    - property: short_description
      value: 'Driver race group the row covers: every stop (all), one of the source''s race groups, or
        race_unknown.'
    - property: has_total
      value: true
    - property: total_value
      value: 'all'
    - property: key_metric_grain_contributor
      value: true
    primaryKey: true
    primaryKeyPosition: 3
  - name: traffic_stops
    logicalType: integer
    physicalType: bigint
    required: true
    description: Count of Georgia State Patrol traffic stops in the cell, aggregated from stop-level records
      (one record per stop). Every stop in the source resulted in a warning, so this equals the count
      of warnings issued. Cells exist only where at least one stop occurred — there are no zero-filled
      cells, and the metric is never NULL.
    examples:
    - 21641
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Traffic Stops
    - property: short_description
      value: Number of state patrol traffic stops (each resulting in a warning) in the county, year, and
        driver race group.
    - property: unit
      value: count
    - property: key_metric
      value: true
  quality:
  - type: sql
    name: non_empty
    description: The dataset has at least one row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object}
    mustBeGreaterThan: 0
  - type: sql
    name: demographic_in_allowed_values
    description: demographic is one of the 7 canonical codes.
    dimension: conformity
    query: SELECT COUNT(*) FROM {object} WHERE demographic IS NOT NULL AND demographic NOT IN ('all',
      'asian_pacific_islander', 'black', 'hispanic', 'other', 'race_unknown', 'white')
    mustBe: 0
  - type: sql
    name: traffic_stops_non_negative
    description: traffic_stops is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE traffic_stops IS NOT NULL AND traffic_stops < 0
    mustBe: 0
  - type: sql
    name: race_partition_traffic_stops
    description: Every stop carries exactly one race-axis value (including race_unknown for unrecorded
      race), so per (year, county_fips) the six race rows must sum exactly to the 'all' row. GROUP BY
      treats the NULL county_fips of state rows as one group, so the invariant is enforced at both detail
      levels.
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, county_fips, MAX(CASE WHEN demographic = 'all' THEN traffic_stops
      END) AS total, SUM(CASE WHEN demographic IN ('asian_pacific_islander','black','hispanic','other','race_unknown','white')
      THEN traffic_stops END) AS race_sum FROM {object} GROUP BY year, county_fips) WHERE total IS NOT
      NULL AND race_sum IS NOT NULL AND total != race_sum
    mustBe: 0
  - type: sql
    name: state_covers_county_sum
    description: State rows count every stop while county rows exclude the 10 stops with unmappable county
      labels, so per (year, demographic) the state value must be at least the county sum and exceed it
      by at most 10.
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, demographic, MAX(CASE WHEN county_fips IS NULL THEN traffic_stops
      END) AS state_total, SUM(CASE WHEN county_fips IS NOT NULL THEN traffic_stops END) AS county_sum
      FROM {object} GROUP BY year, demographic) WHERE state_total IS NOT NULL AND county_sum IS NOT NULL
      AND (county_sum > state_total OR state_total - county_sum > 10)
    mustBe: 0
  - type: sql
    name: traffic_stops_positive
    description: Cells are emitted only for observed (year, geography, demographic) groups — no zero-fill
      — so every count must be at least 1.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object} WHERE traffic_stops IS NULL OR traffic_stops < 1
    mustBe: 0
  - type: sql
    name: year_at_or_after_2000
    description: 'Project-wide year floor: no gold rows before calendar year 2000 (the source spans 2012-2016).'
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE year < 2000
    mustBe: 0
customProperties:
- property: title
  value: State Patrol Traffic Stops
- property: summary
  value: Georgia State Patrol traffic stops (all warnings) per county, year, and driver race group, 2012-2016,
    from the Stanford Open Policing Project.
- property: source
  value: Stanford Open Policing Project — Georgia statewide traffic stops (Georgia Department of Public
    Safety / State Patrol)
- property: source_url
  value: https://openpolicing.stanford.edu/data/
- property: update_frequency
  value: static (frozen source; 2012-2016 is complete and final)
- property: year_range
  value: 2012-2016
- property: schema_hash
  value: a9064c5e243b69cd245d5f1179c4452ce26594605e0ff92c4a9ad091589d024a
- property: available_years
  value:
  - 2012
  - 2013
  - 2014
  - 2015
  - 2016
- property: year_gaps
  value: []
