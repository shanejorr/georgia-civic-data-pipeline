  quality:
  - type: sql
    name: non_empty
    description: The dataset has at least one row.
    dimension: completeness
    query: SELECT COUNT(*) FROM {object}
    mustBeGreaterThan: 0
  - type: sql
    name: month_in_allowed_values
    description: month is one of the 13 canonical codes.
    dimension: conformity
    query: SELECT COUNT(*) FROM {object} WHERE month IS NOT NULL AND month NOT IN ('01', '02', '03', '04',
      '05', '06', '07', '08', '09', '10', '11', '12', 'all')
    mustBe: 0
  - type: sql
    name: avg_daily_population_non_negative
