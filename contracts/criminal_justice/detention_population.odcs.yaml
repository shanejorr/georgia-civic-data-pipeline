    name: adp_male_noncriminal_non_negative
    description: adp_male_noncriminal is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_male_noncriminal IS NOT NULL AND adp_male_noncriminal
      < 0
    mustBe: 0
  - type: sql
    name: adp_female_criminal_non_negative
    description: adp_female_criminal is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_female_criminal IS NOT NULL AND adp_female_criminal
      < 0
    mustBe: 0
  - type: sql
    name: adp_female_noncriminal_non_negative
    description: adp_female_noncriminal is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_female_noncriminal IS NOT NULL AND adp_female_noncriminal
      < 0
    mustBe: 0
  - type: sql
    name: adp_threat_level_1_non_negative
    description: adp_threat_level_1 is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_threat_level_1 IS NOT NULL AND adp_threat_level_1 <
      0
    mustBe: 0
  - type: sql
    name: adp_threat_level_2_non_negative
    description: adp_threat_level_2 is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_threat_level_2 IS NOT NULL AND adp_threat_level_2 <
      0
    mustBe: 0
  - type: sql
    name: adp_threat_level_3_non_negative
    description: adp_threat_level_3 is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_threat_level_3 IS NOT NULL AND adp_threat_level_3 <
      0
    mustBe: 0
  - type: sql
    name: adp_no_threat_level_non_negative
    description: adp_no_threat_level is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_no_threat_level IS NOT NULL AND adp_no_threat_level
      < 0
    mustBe: 0
  - type: sql
    name: adp_mandatory_detention_non_negative
    description: adp_mandatory_detention is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE adp_mandatory_detention IS NOT NULL AND adp_mandatory_detention
      < 0
    mustBe: 0
  - type: sql
    name: guaranteed_minimum_beds_non_negative
    description: guaranteed_minimum_beds is a count (>= 0).
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE guaranteed_minimum_beds IS NOT NULL AND guaranteed_minimum_beds
      < 0
    mustBe: 0
  - type: sql
    name: monthly_metrics_null_on_fiscal_year_rows
    description: The daily-panel metric family exists only on monthly rows — every fiscal-year ('all')
      row must carry NULL for all four monthly-only metrics.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month = 'all' AND (avg_daily_male IS NOT NULL OR avg_daily_female
      IS NOT NULL OR avg_daily_convicted_criminal IS NOT NULL OR avg_daily_possibly_under_18 IS NOT NULL)
    mustBe: 0
  - type: sql
    name: fiscal_year_metrics_null_on_monthly_rows
    description: The ICE workbook ADP breakdowns are fiscal-year values — every monthly row must carry
      NULL for all fourteen fiscal-year-only metrics.
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month != 'all' AND (adp_security_level_a IS NOT NULL OR
      adp_security_level_b IS NOT NULL OR adp_security_level_c IS NOT NULL OR adp_security_level_d IS
      NOT NULL OR adp_male_criminal IS NOT NULL OR adp_male_noncriminal IS NOT NULL OR adp_female_criminal
      IS NOT NULL OR adp_female_noncriminal IS NOT NULL OR adp_threat_level_1 IS NOT NULL OR adp_threat_level_2
      IS NOT NULL OR adp_threat_level_3 IS NOT NULL OR adp_no_threat_level IS NOT NULL OR adp_mandatory_detention
      IS NOT NULL OR guaranteed_minimum_beds IS NOT NULL)
    mustBe: 0
  - type: sql
    name: monthly_rows_start_fy2023
    description: 'Monthly rows exist only from FY2023 (the DDP daily panel starts 2022-10-01, which is
      fiscal year 2023) — guards the October-December fiscal-year attribution: a regression in the +1
      FY logic would land Oct-Dec 2022 rows at year=2022.'
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month != 'all' AND year < 2023
    mustBe: 0
  - type: sql
    name: adp_gender_criminality_partition_sums_to_total
    description: ICE's gender x criminality breakdown partitions total ADP — the four components must
      sum to avg_daily_population on fiscal-year rows (tolerance 0.05 for float aggregation).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month = 'all' AND avg_daily_population IS NOT NULL AND
      adp_male_criminal IS NOT NULL AND adp_male_noncriminal IS NOT NULL AND adp_female_criminal IS NOT
      NULL AND adp_female_noncriminal IS NOT NULL AND ABS(adp_male_criminal + adp_male_noncriminal + adp_female_criminal
      + adp_female_noncriminal - avg_daily_population) > 0.05
    mustBe: 0
  - type: sql
    name: adp_security_level_partition_sums_to_total
    description: ICE's security-level breakdown partitions total ADP — levels A-D must sum to avg_daily_population
      on fiscal-year rows (verified to 1e-6 at the facility level; tolerance 0.05 after county/state aggregation).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month = 'all' AND avg_daily_population IS NOT NULL AND
      adp_security_level_a IS NOT NULL AND adp_security_level_b IS NOT NULL AND adp_security_level_c IS
      NOT NULL AND adp_security_level_d IS NOT NULL AND ABS(adp_security_level_a + adp_security_level_b
      + adp_security_level_c + adp_security_level_d - avg_daily_population) > 0.05
    mustBe: 0
  - type: sql
    name: adp_threat_level_partition_sums_to_total
    description: ICE's threat-level breakdown partitions total ADP — levels 1-3 plus no-threat-level must
      sum to avg_daily_population on fiscal-year rows (tolerance 0.05).
    dimension: consistency
    query: SELECT COUNT(*) FROM {object} WHERE month = 'all' AND avg_daily_population IS NOT NULL AND
      adp_threat_level_1 IS NOT NULL AND adp_threat_level_2 IS NOT NULL AND adp_threat_level_3 IS NOT
      NULL AND adp_no_threat_level IS NOT NULL AND ABS(adp_threat_level_1 + adp_threat_level_2 + adp_threat_level_3
      + adp_no_threat_level - avg_daily_population) > 0.05
    mustBe: 0
  - type: sql
    name: adp_mandatory_within_total
    description: Detainees subject to mandatory detention are a subset of the detained population — adp_mandatory_detention
      can never exceed avg_daily_population.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE month = 'all' AND adp_mandatory_detention IS NOT NULL AND
      avg_daily_population IS NOT NULL AND adp_mandatory_detention > avg_daily_population + 0.05
    mustBe: 0
  - type: sql
    name: monthly_gender_split_within_total
    description: The daily panel's gender counts never exceed the total (they can fall slightly short
      when gender is unrecorded) — avg_daily_male + avg_daily_female must not exceed avg_daily_population
      on monthly rows.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE month != 'all' AND avg_daily_male IS NOT NULL AND avg_daily_female
      IS NOT NULL AND avg_daily_population IS NOT NULL AND avg_daily_male + avg_daily_female > avg_daily_population
      + 0.01
    mustBe: 0
  - type: sql
    name: monthly_subset_metrics_within_total
    description: Convicted-criminal and possibly-under-18 counts are subsets of the detained population
      — neither monthly mean can exceed avg_daily_population.
    dimension: accuracy
    query: SELECT COUNT(*) FROM {object} WHERE month != 'all' AND avg_daily_population IS NOT NULL AND
      ((avg_daily_convicted_criminal IS NOT NULL AND avg_daily_convicted_criminal > avg_daily_population
      + 0.01) OR (avg_daily_possibly_under_18 IS NOT NULL AND avg_daily_possibly_under_18 > avg_daily_population
      + 0.01))
    mustBe: 0
  - type: sql
    name: state_adp_equals_sum_of_counties
    description: Statewide rows are built by summing the county rows — the state avg_daily_population
      must equal the county sum for every (year, month) (tolerance 0.01 for float re-aggregation).
    dimension: consistency
    query: SELECT COUNT(*) FROM (SELECT year, month, MAX(CASE WHEN county_fips IS NULL THEN avg_daily_population
      END) AS state_total, SUM(CASE WHEN county_fips IS NOT NULL THEN avg_daily_population END) AS county_sum
      FROM {object} GROUP BY year, month) WHERE state_total IS NOT NULL AND county_sum IS NOT NULL AND
      ABS(state_total - county_sum) > 0.01
    mustBe: 0
customProperties:
- property: title
