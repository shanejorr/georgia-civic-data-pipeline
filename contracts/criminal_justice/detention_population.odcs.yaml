apiVersion: v3.1.0
kind: DataContract
id: criminal_justice.detention_population
name: detention_population
version: 1.0.0
status: active
domain: criminal_justice
tenant: georgia-public-data
description:
  purpose: 'ICE immigration-detention population held in Georgia facilities (Stewart Detention Center,
    the three Folkston ICE processing centers, Irwin County, Robert A. Deyton, federal prison holds, and
    county jails with intergovernmental agreements), rolled up to the county level. Fiscal-year rows (month
    = ''all'', FY2019 onward) carry ICE''s official average daily population (ADP) broken down three independent
    ways — security classification level, gender x criminality, and ICE threat level — plus ADP subject
    to mandatory detention and contractual guaranteed-minimum beds, sourced from the Deportation Data
    Project''s collation of ICE''s detention-management workbooks and verified against the ICE workbooks
    themselves. Monthly rows (FY2023 onward) carry monthly means of daily facility headcounts — total,
    by gender, convicted-criminal, and possibly under 18 — computed from the Deportation Data Project''s
    FOIA-based daily facility population panel. The year column is the FEDERAL FISCAL YEAR (October 1
    - September 30): monthly rows for October-December fall in the prior calendar year, and each fiscal
    year''s ''all'' row is the fiscal-year average, not a calendar-year one.'
  usage: 'Cite both sources per the Deportation Data Project''s requirement: fiscal-year rows are ''government
    statistics published by ICE, collated by the Deportation Data Project, and analyzed by Georgia Civic
    Data''; monthly rows are ''government data provided by ICE in response to a FOIA request, processed
    by the Deportation Data Project, and analyzed by Georgia Civic Data''. Filter month = ''all'' for
    fiscal-year ADP series and month != ''all'' for the monthly series — the two families come from different
    publications and reconcile only approximately (within about 2 percent). Remember the year column is
    the federal fiscal year: October-December monthly rows fall in the prior calendar year.'
  limitations: 'State rows have NULL county_fips. The year column is the FEDERAL FISCAL YEAR (Oct 1 -
    Sep 30). The latest fiscal year is a year-to-date snapshot (its ''all'' row averages Oct 1 through
    ICE''s latest biweekly workbook snapshot; ICE also silently revises closed years). Fiscal-year rows
    cover the facilities ICE published each year (6-9 in Georgia); a facility ICE stopped using mid-year
    keeps its last published fiscal-YTD value (e.g. Irwin County FY2021, absent from ICE''s end-of-year
    workbook, is recovered from its final intra-year snapshot). Monthly rows cover FY2023 onward only
    (the DDP daily panel starts 2022-10-01) and always include all 14 counties that ever held ICE detainees
    in the panel — county jails with dormant agreements carry real zeros, not missing data. The FY2019
    snapshot omits ADP for the two Folkston IPCs (guaranteed-minimum beds only). Average length of stay
    and book-in counts are deliberately not served: neither aggregates correctly from facility publications
    to county grain without record-level weights. No values are suppressed; NULL means ICE published no
    value for that cell''s source.'
tags:
- criminal_justice
- u.s. immigration and customs enforcement detention statistics
- detention_population
servers:
- server: s3_gold
  type: s3
  location: s3://georgia-data-gold/criminal_justice/detention_population/**/*.parquet
  format: parquet
- server: local_gold
  type: local
  path: data/gold/criminal_justice/detention_population/**/*.parquet
  format: parquet
schema:
- name: detention_population
  logicalType: object
  physicalType: parquet
  physicalName: detention_population
  description: detention_population fact table, year-partitioned Parquet (split by detail level where
    present).
  dataGranularityDescription: One row per year, county_fips, month (geography columns are NULL at higher
    aggregation levels).
  customProperties:
  - property: sub_topic
    value: ice_detention
  - property: detail_levels
    value:
    - counties
    - states
  - property: default_detail
    value: counties
  - property: grain
    value:
    - year
    - county_fips
    - month
  - property: key_metric
    value: avg_daily_population
  - property: null_semantics
    value:
      suppressed_to_null: false
      zero_is_real: true
  - property: partition_columns
    value:
    - year
  - property: path_template
    value: criminal_justice/detention_population/year={year}/{detail}.parquet
  - property: foreign_keys
    value:
    - column: county_fips
      target_object: counties
      target_columns:
      - county_fips
      attribute_columns:
      - county_name
      scope: global
  - property: example_queries
    value:
    - description: Latest year (2026), counties detail
      query: SELECT * FROM detention_population WHERE year = 2026 LIMIT 100
    - description: Filter by month = all
      query: SELECT * FROM detention_population WHERE month = 'all' AND year = 2026 LIMIT 100
  properties:
  - name: year
    logicalType: integer
    physicalType: int
    required: true
    description: 'FEDERAL FISCAL YEAR (October 1 - September 30), not the calendar year: fiscal year 2025
      spans 2024-10-01 to 2025-09-30. All metrics — the fiscal-year ADP averages and the monthly means
      — are keyed to this fiscal calendar. The current (latest) fiscal year is a year-to-date snapshot,
      not a final full-year value: its ''all'' row averages October 1 through ICE''s latest workbook snapshot
      date, and its monthly rows run through the last complete month of the DDP daily panel.'
    examples:
    - 2025
    customProperties:
    - property: column_role
      value: year
    - property: label
      value: Year
    - property: short_description
      value: Federal fiscal year (October 1 of the prior calendar year through September 30).
    primaryKey: true
    primaryKeyPosition: 1
  - name: county_fips
    logicalType: string
    physicalType: string
    required: false
    description: 5-digit county FIPS code (state prefix 13) of the county containing the detention facility
      or facilities; FK to the counties dimension. NULL on statewide rollup rows. Stewart Detention Center
      is 13259 (Stewart County); the three Folkston ICE processing centers roll up to 13049 (Charlton
      County); the Atlanta federal penitentiary and hold rooms roll up to 13121 (Fulton County). A county's
      value sums every ICE facility located in it.
    examples:
    - '13259'
    relationships:
    - to: counties.county_fips
    customProperties:
    - property: column_role
      value: fk_county
    - property: label
      value: County FIPS
    - property: null_meaning
      value: NULL on statewide rollup rows.
    primaryKey: true
    primaryKeyPosition: 2
  - name: month
    logicalType: string
    physicalType: string
    required: true
    description: Calendar month as a zero-padded string ('01'-'12'), or 'all' for the fiscal-year row.
      Months '10'-'12' belong to the fiscal year's opening quarter and therefore fall in the PRIOR calendar
      year (year=2025, month='11' is November 2024). Monthly rows exist from FY2023 (October 2022) onward
      — the extent of the DDP daily panel — and cover complete calendar months only (a trailing partial
      month is dropped, e.g. March 2026 with 10 of 31 days published). Fiscal-year 'all' rows exist for
      every year from FY2019.
    examples:
    - 'all'
    enum:
    - '01'
    - '02'
    - '03'
    - '04'
    - '05'
    - '06'
    - '07'
    - '08'
    - '09'
    - '10'
    - '11'
    - '12'
    - 'all'
    customProperties:
    - property: column_role
      value: categorical
    - property: label
      value: Month
    - property: short_description
      value: Calendar month within the fiscal year ('01'-'12'), or 'all' for the fiscal-year-total row.
    - property: has_total
      value: true
    - property: total_value
      value: 'all'
    - property: key_metric_grain_contributor
      value: true
    primaryKey: true
    primaryKeyPosition: 3
  - name: avg_daily_population
    logicalType: number
    physicalType: double
    required: false
    description: Average daily detained population, summed across the county's ICE facilities. The only
      metric populated on both row kinds. On fiscal-year rows (month='all') it is ICE's official fiscal-YTD
      ADP (the sum of the four gender x criminality ADP components, each of ICE's three published breakdowns
      sums to total ADP). On monthly rows it is the monthly mean of the DDP daily panel's n_detained (distinct
      individuals detained at any point in the day) — this definition reproduces ICE's fiscal-year ADP
      to within about 2 percent. Values are fractional averages; never round them to headcounts.
    examples:
    - 2025.8
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Average Daily Population
    - property: short_description
      value: 'Average daily ICE detention population across the county''s facilities (fractional: an average,
        not a headcount).'
    - property: unit
      value: count
    - property: null_meaning
      value: NULL only where ICE published no ADP for any of the county's facilities that fiscal year
        (FY2019 Folkston IPCs).
    - property: key_metric
      value: true
  - name: avg_daily_male
    logicalType: number
    physicalType: double
    required: false
    description: Monthly mean of the daily count of detained people ICE records as male. Populated on
      monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel starts); NULL on
      fiscal-year rows (month = 'all'). avg_daily_male + avg_daily_female can fall slightly short of avg_daily_population
      (gender occasionally unrecorded); it never exceeds it.
    examples:
    - 1758.3
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Average Daily Male
    - property: unit
      value: count
    - property: null_meaning
      value: Populated on monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel
        starts); NULL on fiscal-year rows (month = 'all').
  - name: avg_daily_female
    logicalType: number
    physicalType: double
    required: false
    description: Monthly mean of the daily count of detained people ICE records as female. Populated on
      monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel starts); NULL on
      fiscal-year rows (month = 'all').
    examples:
    - 155.0
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Average Daily Female
    - property: unit
      value: count
    - property: null_meaning
      value: Populated on monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel
        starts); NULL on fiscal-year rows (month = 'all').
  - name: avg_daily_convicted_criminal
    logicalType: number
    physicalType: double
    required: false
    description: Monthly mean of the daily count of detained people with a criminal conviction (ICE's
      classification). Populated on monthly rows only (which begin October 2022 = FY2023, when the DDP
      daily panel starts); NULL on fiscal-year rows (month = 'all').
    examples:
    - 590.2
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Average Daily Convicted Criminal
    - property: unit
      value: count
    - property: null_meaning
      value: Populated on monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel
        starts); NULL on fiscal-year rows (month = 'all').
  - name: avg_daily_possibly_under_18
    logicalType: number
    physicalType: double
    required: false
    description: Monthly mean of the daily count of detained people DDP flags as possibly under 18 (based
      on recorded birth year). Near zero at Georgia facilities. Populated on monthly rows only (which
      begin October 2022 = FY2023, when the DDP daily panel starts); NULL on fiscal-year rows (month =
      'all').
    examples:
    - 0.1
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Average Daily Possibly Under 18
    - property: unit
      value: count
    - property: null_meaning
      value: Populated on monthly rows only (which begin October 2022 = FY2023, when the DDP daily panel
        starts); NULL on fiscal-year rows (month = 'all').
  - name: adp_security_level_a
    logicalType: number
    physicalType: double
    required: false
    description: ADP of detainees classified at security level A (lowest custody level of ICE's A-D classification).
      Fiscal-YTD average daily population — fractional by construction (person-days divided by days elapsed
      in the fiscal year). For a facility ICE stopped using mid-year, the value is ICE's last published
      fiscal-YTD average for that year.
    examples:
    - 1022.4
    customProperties:
    - property: column_role
      value: metric
    - property: label
      value: Adp Security Level a
    - property: unit
      value: count
    - property: null_meaning
      value: Populated on fiscal-year rows (month = 'all') only; NULL on monthly rows. Also NULL where
        ICE did not publish the facility's breakdown (the FY2019 snapshot omits ADP for the two Folkston
        IPCs).
  - name: adp_security_level_b
    logicalType: number
